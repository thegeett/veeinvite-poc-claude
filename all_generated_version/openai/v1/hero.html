<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Noto+Serif+Gujarati:wght@400;600;700&family=Rozha+One&family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; }
    body { overflow-x: hidden; }
    .ww-section { width: 100%; position: relative; isolation: isolate; }
    .hero_001 { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f7eaea, #ffffff); padding: 4rem; position: relative; overflow: hidden; } .hero_001-wrap { max-width: 1200px; display: flex; flex-direction: row; align-items: center; } .hero_001-content { flex: 1; text-align: center; } .hero_001-title { font-family: 'Rozha One', serif; font-size: 4rem; color: #4a2a2a; margin: 0; } .hero_001-date, .hero_001-location { font-family: 'Manrope', sans-serif; color: #7a4b4b; font-size: 1.5rem; margin: 0.5rem 0; } .hero_001-message { font-family: 'Noto Serif Gujarati', serif; color: #5a2a2a; font-size: 1.25rem; margin-top: 1rem; padding: 0 2rem; } .hero_001-decorative { position: absolute; top: 0; right: 0; width: 60%; height: 100%; pointer-events: none; } .hero_001-mandala { position: absolute; top: 10%; right: 10%; width: 150px; height: 150px; background: url('mandala.png') no-repeat center center; background-size: contain; opacity: 0.1; } .hero_001-diya { position: absolute; bottom: 10%; left: 10%; width: 100px; height: 100px; background: url('diya.png') no-repeat center center; background-size: contain; opacity: 0.1; } .hero_001-gradient-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(247, 234, 234, 0.5), rgba(255, 255, 255, 0)); pointer-events: none; } @media (max-width: 900px) { .hero_001 { padding: 3rem; } .hero_001-title { font-size: 3rem; } .hero_001-date, .hero_001-location, .hero_001-message { font-size: 1.25rem; } .hero_001-wrap { flex-direction: column; } } @media (max-width: 640px) { .hero_001 { padding: 2rem; } .hero_001-title { font-size: 2.5rem; } .hero_001-date, .hero_001-location, .hero_001-message { font-size: 1rem; } .hero_001-message { padding: 0 1rem; } }
  </style>
</head>
<body>
<section class="ww-section hero_001"> <div class="hero_001-wrap"> <div class="hero_001-content"> <h1 class="hero_001-title">Kavya & Mihir</h1> <p class="hero_001-date">March 22, 2026</p> <p class="hero_001-location">Akshar Grand Palace, Somerset, NJ</p> <p class="hero_001-message">With blessings of Shri Ganesh and our families, we invite you to celebrate a joyful Gujarati wedding filled with mehendi, garba, baraat, sacred pheras, dinner, music, and love.</p> </div> <div class="hero_001-decorative"> <div class="hero_001-mandala"></div> <div class="hero_001-diya"></div> <div class="hero_001-gradient-overlay"></div> </div> </div> </section>
</body>
</html>
